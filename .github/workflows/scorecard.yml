name: Scorecard analysis workflow

on:
  push:
    branches: [main]
  schedule:
    # Weekly on Saturdays.
    - cron: "30 1 * * 6"

# Scorecard's publish-results API enforces restrictions on this workflow:
# no top-level env/defaults, no workflow-level write permissions, and only
# the job below may carry id-token: write. See
# https://github.com/ossf/scorecard-action#workflow-restrictions
permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # needed to upload SARIF to the Security tab
      id-token: write # needed for the GitHub OIDC token used by publish_results

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
