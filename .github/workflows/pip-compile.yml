name: pip-compile

# Regenerates requirements-dev.txt on Python 3.12 (matching CI) in two cases:
# 1. Automatically when Dependabot bumps requirements-dev.in (pull_request_target).
#    Commits directly to the Dependabot branch so its PR picks up the updated lockfile.
# 2. Manually via workflow_dispatch — creates a branch + PR against main, since
#    enforce_admins blocks direct pushes to main even from automation.
#
# pull_request_target is used (not pull_request) so the job has write access to
# commit back to the Dependabot branch. The `if: dependabot[bot]` guard prevents
# arbitrary PR authors from triggering the write-access job.

on:
  pull_request_target:
    paths:
      - requirements-dev.in
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch whose requirements-dev.in to recompile"
        required: true
        default: "main"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regenerate:
    name: Regenerate lockfile
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.actor == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: >-
            ${{
              github.event_name == 'pull_request_target'
              && github.event.pull_request.head.ref
              || inputs.ref
            }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install pip-tools from existing lockfile
        run: pip install --require-hashes -r requirements-dev.txt

      - name: Regenerate lockfile
        run: |
          pip-compile --generate-hashes --strip-extras --allow-unsafe \
            --output-file requirements-dev.txt requirements-dev.in

      - name: Commit updated lockfile
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add requirements-dev.txt
          if git diff --staged --quiet; then
            echo "Lockfile already up to date."
            exit 0
          fi
          git commit -m "chore: regenerate lockfile on Python 3.12"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BRANCH="chore/regenerate-lockfile-$(date +%Y%m%d-%H%M%S)"
            git checkout -b "$BRANCH"
            git push origin "$BRANCH"
            gh pr create \
              --title "chore: regenerate lockfile on Python 3.12" \
              --body "Lockfile recompiled on Python 3.12 to match CI. Triggered via workflow_dispatch." \
              --base main --head "$BRANCH"
          else
            git push
          fi
