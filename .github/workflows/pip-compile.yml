name: pip-compile

# Regenerates requirements-dev.txt on Python 3.12 (matching CI) in two cases:
# 1. Automatically when Dependabot bumps requirements-dev.in (pull_request_target)
# 2. Manually via workflow_dispatch — use this to resync the lockfile after any
#    manual edit to requirements-dev.in, or to fix a Python-version mismatch.
#
# pull_request_target is used (not pull_request) so the job has write access to
# commit back to the PR branch. The `if: dependabot[bot]` guard on the
# pull_request_target path prevents arbitrary PR authors from triggering the
# write-access job.

on:
  pull_request_target:
    paths:
      - requirements-dev.in
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch to recompile lockfile on"
        required: true
        default: "main"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regenerate:
    name: Regenerate lockfile
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.actor == 'dependabot[bot]'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: >-
            ${{
              github.event_name == 'pull_request_target'
              && github.event.pull_request.head.ref
              || inputs.ref
            }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install pip-tools from existing lockfile
        run: pip install --require-hashes -r requirements-dev.txt

      - name: Regenerate lockfile
        run: |
          pip-compile --generate-hashes --strip-extras --allow-unsafe \
            --output-file requirements-dev.txt requirements-dev.in

      - name: Commit updated lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add requirements-dev.txt
          git diff --staged --quiet || \
            (git commit -m "chore: regenerate lockfile" && git push)
